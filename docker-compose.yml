services:
  dashboard:
    build: .
    container_name: maven-dashboard
    restart: unless-stopped
    ports:
      - "8050:8050"
    volumes:
      # Mount data folder dari host agar bisa update CSV tanpa rebuild image
      - ./data:/app/data:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
